run_name: task2_fourier_bert
output_dir: ./outputs
save_dir: ./models
seed: 42

data:
  dataset_id: badrex/nnti-dataset-full
  train_split: train
  eval_split: validation
  audio_column: audio_filepath
  label_column: language
  speaker_column: speaker_id
  sampling_rate: 16000
  max_duration_seconds: 7.0
  preprocessing_batch_size: 16
  preprocessing_keep_in_memory: true
  preprocessing_load_from_cache_file: false
  preprocessing_writer_batch_size: 16

model:
  id: facebook/w2v-bert-2.0
  apply_dropout: false
  dropout: 0
  freeze_feature_encoder: false

training:
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 2
  num_train_epochs: 8
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: linear
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_only_model: true
  save_safetensors: true
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: accuracy
  greater_is_better: true
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  push_to_hub: false
  group_by_length: false

# Fourier-domain perturbation controls.
fourier:
  enabled: true
  train_only: true
  apply_prob: 0.6

  magnitude_dropout_prob: 0.7
  magnitude_dropout_bands_min: 1
  magnitude_dropout_bands_max: 2
  magnitude_dropout_width_min: 0.05
  magnitude_dropout_width_max: 0.20
  magnitude_dropout_attenuation_min: 0.0
  magnitude_dropout_attenuation_max: 0.7

  phase_noise_prob: 0.3
  phase_noise_std: 0.05

  highpass_prob: 0.25
  highpass_min_hz: 40
  highpass_max_hz: 150

  lowpass_prob: 0.25
  lowpass_min_hz: 3500
  lowpass_max_hz: 6000

  filter_floor: 0.05

tracking:
  use_wandb: true
  wandb_project: huggingface
  wandb_run_name: task2_fourier_bert
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY
