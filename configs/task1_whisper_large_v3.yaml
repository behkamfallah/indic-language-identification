run_name: task1_whisper_large_v3
output_dir: ./outputs
save_dir: ./models
seed: 42

data:
  dataset_id: badrex/nnti-dataset-full
  train_split: train
  eval_split: validation
  audio_column: audio_filepath
  label_column: language
  speaker_column: speaker_id
  sampling_rate: 16000
  max_duration_seconds: 8.0
  preprocessing_batch_size: 16

model:
  id: openai/whisper-large-v3
  apply_dropout: true
  dropout: 0.1
  freeze_feature_encoder: true

training:
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 4
  num_train_epochs: 10
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: accuracy
  greater_is_better: true
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  push_to_hub: false
  group_by_length: true

tracking:
  use_wandb: true
  wandb_project: Indic-SLID
  wandb_run_name: task1_whisper_large_v3
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY
