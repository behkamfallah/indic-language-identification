run_name: task2_aug_baseline_mms300m
output_dir: ./outputs
save_dir: ./models
seed: 42

data:
  dataset_id: badrex/nnti-dataset-full
  train_split: train
  eval_split: validation
  audio_column: audio_filepath
  label_column: language
  speaker_column: speaker_id
  sampling_rate: 16000
  max_duration_seconds: 8.0
  preprocessing_batch_size: 32

model:
  id: facebook/mms-300m
  apply_dropout: true
  dropout: 0.1
  freeze_feature_encoder: true

training:
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 2
  num_train_epochs: 16
  learning_rate: 5.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: linear
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: accuracy
  greater_is_better: true
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  push_to_hub: false
  group_by_length: true

tracking:
  use_wandb: true
  wandb_project: Indic-SLID
  wandb_run_name: task2_aug_baseline_mms300m
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY

# ---------------------------------------------------------------------------
# Augmentation (applied to the training split only)
# ---------------------------------------------------------------------------
# Three waveform-level augmentations + SpecAugment (model-internal).
# Set enabled: false to turn off globally, or disable individual transforms.
augmentation:
  enabled: true

  # Gaussian noise at a random SNR in [min_snr_db, max_snr_db].
  # High SNR = faint noise; low SNR = heavy noise.
  noise:
    enabled: true
    prob: 0.5
    min_snr_db: 15.0
    max_snr_db: 40.0

  # Random amplitude scaling to simulate different recording levels.
  volume_jitter:
    enabled: true
    prob: 0.4
    min_gain_db: -6.0
    max_gain_db: 6.0

  # Waveform resampling to simulate slightly faster/slower speech.
  # Also implicitly perturbs pitch, which is acceptable for language ID.
  # Requires scipy.
  speed_perturb:
    enabled: true
    prob: 0.4
    min_speed: 0.9
    max_speed: 1.1

  # SpecAugment: time and frequency masking applied inside the model
  # during training (model.training=True only — eval is unaffected).
  # mask_time_prob: fraction of time steps masked per sample.
  # mask_feature_prob: fraction of feature (freq) channels masked.
  spec_augment:
    enabled: true
    mask_time_prob: 0.05
    mask_time_length: 10
    mask_feature_prob: 0.004
    mask_feature_length: 10

