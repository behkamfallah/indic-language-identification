run_name: task1_w2v_bert
output_dir: ./outputs/task1_w2v_bert
save_dir: ./models/task1_w2v_bert
seed: 42

data:
  dataset_id: badrex/nnti-dataset-full
  train_split: train
  eval_split: validation
  audio_column: audio_filepath
  label_column: language
  speaker_column: speaker_id
  sampling_rate: 16000
  max_duration_seconds: 7.0
  preprocessing_batch_size: 16

model:
  id: facebook/w2v-bert-2.0
  apply_dropout: false
  dropout: 0.1
  freeze_feature_encoder: false

training:
  batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 5
  learning_rate: 5.0e-6
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: accuracy
  greater_is_better: true
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  push_to_hub: false
  group_by_length: false

tracking:
  use_wandb: false
  wandb_project: Indic-SLID
  wandb_run_name: task1_w2v_bert
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY
